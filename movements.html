{% extends 'base.html' %}{% block content %}<h1>Movimenti di magazzino</h1><div class="table-wrap"><table><thead><tr><th>Data</th><th>Codice</th><th>Tipo</th><th>Variazione</th><th>Nota</th></tr></thead><tbody>{% for m in rows %}<tr><td>{{ m.created_at.strftime('%d/%m/%Y %H:%M') }}</td><td>{{ m.product.brand_code }}</td><td>{{ m.movement_type }}</td><td>{{ '%+d'|format(m.quantity_delta) }}</td><td>{{ m.note or '' }}</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
