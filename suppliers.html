{% extends 'base.html' %}{% block content %}<h1>Fornitori</h1><section class="panel"><form class="form-grid" method="post"><label>Nome<input name="name" required></label><label>Valuta<input name="currency" value="EUR" maxlength="3"></label><label>Email<input type="email" name="email"></label><label>Note<input name="notes"></label><button>Aggiungi</button></form></section><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Valuta</th><th>Email</th><th>Referenze</th></tr></thead><tbody>{% for s in rows %}<tr><td>{{ s.name }}</td><td>{{ s.currency }}</td><td>{{ s.email or '' }}</td><td>{{ s.products|length }}</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
