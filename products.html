{% extends 'base.html' %}{% block content %}<div class="title-row"><h1>Prodotti</h1><a class="button secondary" href="{{ url_for('export_products') }}">Esporta CSV</a></div><form class="search" method="get"><input name="q" value="{{ q }}" placeholder="Codice brand, fornitore o categoria"><button>Cerca</button></form><div class="table-wrap"><table><thead><tr><th>Codice brand</th><th>Codice fornitore</th><th>Categoria</th><th>Prezzo</th><th>Giacenza</th><th>Movimento</th></tr></thead><tbody>{% for p in rows %}<tr class="{% if p.quantity <= p.reorder_level %}low{% endif %}"><td><strong>{{ p.brand_code }}</strong></td><td>{{ p.supplier_code }}</td><td>{{ p.category }}</td><td>{{ p.price|eur }}</td><td>{{ p.quantity }}</td><td><form class="inline" method="post" action="{{ url_for('adjust_stock', product_id=p.id) }}"><input type="number" name="delta" placeholder="+/-" required><input name="note" placeholder="Nota"><button>Salva</button></form></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
