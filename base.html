<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Gestionale TBS{% endblock %}</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body>{% if session.get('logged_in') %}<header><div class="brand">Tattoo Beauty Saloon</div><nav><a href="{{ url_for('dashboard') }}">Dashboard</a><a href="{{ url_for('products') }}">Prodotti</a><a href="{{ url_for('sales') }}">Vendite</a><a href="{{ url_for('movements') }}">Movimenti</a><a href="{{ url_for('suppliers') }}">Fornitori</a><a href="{{ url_for('logout') }}">Esci</a></nav></header>{% endif %}<main>{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></body></html>
